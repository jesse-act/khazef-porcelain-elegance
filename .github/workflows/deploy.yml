name: Deploy

on:
  push:
    branches: [main]

# Évite deux déploiements simultanés sur le même serveur
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: []          # pas de dépendance explicite : CI et Deploy tournent en parallèle
                       # si vous voulez que CI passe d'abord, remplacez par : needs: [build]
                       # et ajoutez un job "build" ici (ou utilisez workflow_run)
    timeout-minutes: 15

    environment:
      name: production
      url: http://${{ secrets.SERVER_HOST }}

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.SERVER_PATH }}
            bash scripts/deploy.sh
